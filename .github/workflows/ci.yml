name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  decky-gate:
    name: Decky plugin gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: decky/pnpm-lock.yaml

      - name: Install pinned pnpm
        run: npm install --global pnpm@9.4.0

      - name: Install Decky dependencies
        working-directory: decky
        run: pnpm install --frozen-lockfile

      - name: Test and build Decky plugin
        working-directory: decky
        run: |
          pnpm test
          pnpm typecheck
          pnpm build

      - name: Verify deterministic Decky package
        run: python3 -m unittest scripts.tests.test_decky_package -v

  demo-gate:
    name: Complete demo gate
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            file \
            ffmpeg \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-tools \
            libayatana-appindicator3-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            librsvg2-dev \
            libssl-dev \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            shellcheck

      - name: Run complete demo gate
        env:
          GOQ_VERIFY_IN_PROCESS_GSTREAMER: "1"
        run: ./scripts/verify-demo-build.sh
