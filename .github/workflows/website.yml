name: Website

on:
  pull_request:
    paths:
      - website/**
      - scripts/verify-website.sh
      - .github/workflows/website.yml
  push:
    branches: [main]
    paths:
      - website/**
      - scripts/verify-website.sh
      - .github/workflows/website.yml

permissions:
  contents: read

concurrency:
  group: website-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Static site
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Verify deployable website
        run: ./scripts/verify-website.sh

  deploy:
    name: Cloudflare Pages
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: main
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Deploy production site
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.112.0
          command: pages deploy website --project-name=goq-sh --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
