# Dedicated persistent sink for the headless Sigil appliance.
# Keep the node name stable: host.toml resolves this exact Audio/Sink and
# captures its monitor. The sink is intentionally not linked to physical audio.
pulse.cmd = [
  {
    cmd = "load-module"
    args = "module-null-sink sink_name=sigil_spark sink_properties=\"device.description=Sigil_Spark_Stream node.always-process=true node.want-driver=true node.pause-on-idle=false session.suspend-timeout-seconds=0\" format=s16le rate=48000 channels=2 channel_map=front-left,front-right"
    flags = [ ]
  }
]
